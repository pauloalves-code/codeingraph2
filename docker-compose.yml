version: "3.9"

# codeingraph2 — surgical context daemon + MCP server
#
# Suporte multi-projeto: cada instalação define INSTANCE_NAME (set via .env
# pelo install_global.sh). Isso garante container, rede e volume únicos.
#
# Volumes:
#   TARGET_CODE          -> /target_code       (código a indexar)
#   OBSIDIAN_VAULT       -> /obsidian_vault     (vault Obsidian gerado)
#   <INSTANCE_NAME>_db   -> /var/lib/codeingraph2 (sqlite graph.db, persistente)

services:
  codeingraph2:
    container_name: ${INSTANCE_NAME:-codeingraph2}_container
    build:
      context: .
      dockerfile: Dockerfile
    image: codeingraph2:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    init: true
    volumes:
      - ${TARGET_CODE:-./target_code}:/target_code
      - ${OBSIDIAN_VAULT:-./obsidian_vault}:/obsidian_vault
      - project_db:/var/lib/codeingraph2
    ports:
      - "${WEB_PORT:-7890}:7890"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      CODEINGRAPH2_DB: /var/lib/codeingraph2/graph.db
      CODEINGRAPH2_TARGET: /target_code
      CODEINGRAPH2_VAULT: /obsidian_vault
      CODEINGRAPH2_TEMPLATES: /opt/codeingraph2/templates
      CODEINGRAPH2_PROJECT_NAME: ${PROJECT_NAME:-project}
      WEB_ENABLED: ${WEB_ENABLED:-1}
      WEB_BIND:    0.0.0.0:7890
      WEB_USER:    ${WEB_USER:-}
      WEB_AUTH:    ${WEB_AUTH:-}
    command: ["daemon"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/codeingraph2", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  project_db:
    name: ${INSTANCE_NAME:-codeingraph2}_db
